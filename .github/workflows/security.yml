name: govulncheck

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck_job:
    runs-on: ubuntu-latest
    name: Run govulncheck
    timeout-minutes: 10
    steps:
      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.26.1
          go-package: ./...
